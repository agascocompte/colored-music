<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        // Determinar si estamos en GitHub Pages o en local
        const isGitHubPages = window.location.hostname.includes('github.io');
        const baseUrl = isGitHubPages ? '/colored-music/' : '';

        // Lista de scripts en orden (ajusta los nombres a minúsculas si es necesario)
        const scripts = [
            'libraries/p5.js',
            'libraries/p5.sound.js',
            'src/managers/audioManager.js',
            'src/visualizers/baseVisualizer.js',
            'src/visualizers/rainbowVisualizer.js',
            'src/visualizers/auroraVisualizer.js',
            'src/visualizers/spiralVisualizer.js',
            'src/visualizers/nebulaVisualizer.js',
            'src/visualizers/verticalLinesVisualizer.js',
            'src/visualizers/flyingMeshVisualizer.js',
            'src/managers/uiManager.js',
            'src/sketch.js'
        ];

        function loadScriptsSequentially(index = 0) {
            if (index >= scripts.length) return;
            const script = document.createElement('script');
            script.src = baseUrl + scripts[index];
            script.type = 'text/javascript';
            script.onload = () => loadScriptsSequentially(index + 1);
            document.head.appendChild(script);
        }

        loadScriptsSequentially();
    </script>
    <title>Colored Music</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        #p5_loading {
            display: none;
        }

        #songList::-webkit-scrollbar,
        #searchResults::-webkit-scrollbar {
            width: 8px;
        }

        #songList::-webkit-scrollbar-track,
        #searchResults::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 8px;
        }

        #songList::-webkit-scrollbar-thumb,
        #searchResults::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 8px;
        }

        #songList::-webkit-scrollbar-thumb:hover,
        #searchResults::-webkit-scrollbar-thumb:hover {
            background: #60a5fa;
        }

        .mode-pill {
            padding: 0.45rem 1.1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .mode-pill:hover {
            background: #334155;
            color: #fff;
            transform: translateY(-1px);
        }

        .mode-pill.active {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.45);
        }

        .tab-btn {
            color: #94a3b8;
        }

        .tab-btn:hover {
            color: #e2e8f0;
        }

        .tab-btn.active {
            color: #fff;
            background: rgba(51, 65, 85, 0.4);
            box-shadow: inset 0 -2px 0 #6366f1;
        }

        .eq {
            width: 20px;
        }

        .eq span {
            flex: 1;
            background: linear-gradient(to top, #3b82f6, #a78bfa);
            border-radius: 2px;
            animation: eqbar 0.9s ease-in-out infinite;
        }

        .eq span:nth-child(1) { animation-delay: 0s; }
        .eq span:nth-child(2) { animation-delay: 0.22s; }
        .eq span:nth-child(3) { animation-delay: 0.45s; }
        .eq span:nth-child(4) { animation-delay: 0.12s; }

        @keyframes eqbar {
            0%, 100% { height: 25%; }
            50% { height: 100%; }
        }

        .eq.paused span {
            animation: none;
            height: 25%;
            opacity: 0.35;
        }
    </style>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%8E%B6%3C/text%3E%3C/svg%3E">
</head>

<body class="bg-slate-950 text-white min-h-screen">

    <!-- Resplandores decorativos de fondo -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
        <div class="absolute -top-48 -left-48 w-[550px] h-[550px] bg-blue-600/20 rounded-full blur-[130px]"></div>
        <div class="absolute -bottom-48 -right-48 w-[550px] h-[550px] bg-purple-600/20 rounded-full blur-[130px]"></div>
    </div>

    <div class="relative z-10 max-w-7xl mx-auto px-4 py-6 flex flex-col min-h-screen">

        <header class="flex items-center justify-center gap-3 mb-6">
            <span class="text-3xl">🎶</span>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-sky-400 to-purple-400 bg-clip-text text-transparent">
                Colored Music
            </h1>
        </header>

        <main class="flex flex-col lg:flex-row gap-6 items-center lg:items-start justify-center flex-1 w-full">

            <!-- Escenario: visualizador + reproductor -->
            <section class="flex flex-col items-center gap-4 w-full lg:flex-1 min-w-0">

                <div id="mode" class="flex flex-wrap justify-center gap-2">
                    <button class="mode-pill" data-mode="espiral" onclick="setMode('espiral')">🌀 Spiral</button>
                    <button class="mode-pill" data-mode="nebula" onclick="setMode('nebula')">🌌 Nebula</button>
                    <button class="mode-pill" data-mode="verticales" onclick="setMode('verticales')">📊 Pulse</button>
                    <button class="mode-pill" data-mode="aurora" onclick="setMode('aurora')">🌠 Aurora</button>
                    <button class="mode-pill" data-mode="rainbow" onclick="setMode('rainbow')">🌈 Rainbow</button>
                    <button class="mode-pill" data-mode="flyingmesh" onclick="setMode('flyingmesh')">✨ Flying Mesh</button>
                </div>

                <div id="canvas" class="w-full max-w-[680px] aspect-square bg-slate-900/80 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden flex items-center justify-center"></div>

                <div class="w-full max-w-[680px] bg-slate-900/80 border border-slate-800 rounded-2xl shadow-lg px-5 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div class="flex items-center gap-3 min-w-0 w-full sm:flex-1">
                        <div id="eq" class="eq paused flex items-end gap-[3px] h-5 shrink-0">
                            <span></span><span></span><span></span><span></span>
                        </div>
                        <div class="min-w-0">
                            <div class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold">Now playing</div>
                            <div id="songSelected" class="text-sm font-semibold text-white truncate">—</div>
                        </div>
                    </div>

                    <div id="buttons" class="flex items-center gap-2 shrink-0">
                        <button id="back" title="Previous" class="w-10 h-10 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-full flex items-center justify-center cursor-pointer transition" onclick="uiManager.handleButtonPressed(3)">
                            <svg class="w-4 h-4" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <path d="M6 14H8L8 9L13 14H15L15 2H13L8 7L8 2H6L0 8L6 14Z"></path>
                            </svg>
                        </button>
                        <button id="play" title="Play" class="w-12 h-12 bg-gradient-to-r from-blue-500 to-purple-500 hover:from-blue-400 hover:to-purple-400 text-white rounded-full flex items-center justify-center cursor-pointer transition shadow-lg shadow-indigo-500/30" onclick="uiManager.handleButtonPressed(1)">
                            <svg class="w-5 h-5 ml-0.5" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5 16L7 16L15 8L7 0L5 0L5 16Z"></path>
                            </svg>
                        </button>
                        <button id="pause" title="Pause" class="w-12 h-12 bg-gradient-to-r from-blue-500 to-purple-500 hover:from-blue-400 hover:to-purple-400 text-white rounded-full flex items-center justify-center cursor-pointer transition shadow-lg shadow-indigo-500/30 hidden" onclick="uiManager.handleButtonPressed(1)">
                            <svg class="w-5 h-5" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <rect x="3" y="1" width="2" height="14"></rect>
                                <rect x="12" y="1" width="2" height="14"></rect>
                            </svg>
                        </button>
                        <button id="stop" title="Stop" class="w-10 h-10 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-full flex items-center justify-center cursor-pointer transition" onclick="uiManager.handleButtonPressed(0)">
                            <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <rect x="1" y="1" width="14" height="14"></rect>
                            </svg>
                        </button>
                        <button id="next" title="Next" class="w-10 h-10 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-full flex items-center justify-center cursor-pointer transition" onclick="uiManager.handleButtonPressed(2)">
                            <svg class="w-4 h-4" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 14H1L1 2H3L8 7L8 2H10L16 8L10 14H8L8 9L3 14Z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Panel lateral: biblioteca y búsqueda -->
            <aside class="w-full lg:w-96 shrink-0 bg-slate-900/80 border border-slate-800 rounded-2xl shadow-lg flex flex-col overflow-hidden">

                <div class="flex border-b border-slate-800">
                    <button id="tabLibrary" class="tab-btn active flex-1 py-3 text-sm font-semibold transition cursor-pointer" onclick="uiManager.showTab('library')">
                        Library
                    </button>
                    <button id="tabSearch" class="tab-btn flex-1 py-3 text-sm font-semibold transition cursor-pointer" onclick="uiManager.showTab('search')">
                        Search
                    </button>
                </div>

                <div id="libraryPanel" class="p-4 flex flex-col gap-3">
                    <ul id="songList" class="space-y-1 max-h-[440px] overflow-y-auto pr-1 text-sm"></ul>
                    <input type="file" id="fileInput" accept="audio/mp3" class="hidden" onchange="uiManager.handleFileUpload(event)" multiple>
                    <button onclick="document.getElementById('fileInput').click()"
                        class="w-full border border-dashed border-slate-600 hover:border-blue-500 hover:text-blue-400 text-slate-300 text-sm font-medium py-2.5 rounded-xl cursor-pointer transition">
                        ＋ Add local MP3
                    </button>
                </div>

                <div id="searchPanel" class="p-4 flex-col gap-3 hidden">
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" placeholder="Song or artist..."
                            class="flex-1 min-w-0 bg-slate-800 text-white text-sm rounded-xl px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-slate-500">
                        <button id="searchButton"
                            class="bg-gradient-to-r from-blue-500 to-purple-500 hover:from-blue-400 hover:to-purple-400 text-white text-sm font-semibold py-2 px-4 rounded-xl cursor-pointer transition">
                            Search
                        </button>
                    </div>
                    <ul id="searchResults" class="hidden space-y-1 max-h-[380px] overflow-y-auto pr-1 text-sm"></ul>
                    <p class="text-xs text-slate-500">Find any song and visualize its 30-second iTunes preview.</p>
                </div>
            </aside>
        </main>

        <footer class="text-center text-xs text-slate-600 pt-6 pb-2">
            Built with p5.js · Sound-reactive visuals
        </footer>
    </div>

</body>

</html>
